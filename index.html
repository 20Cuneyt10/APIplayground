<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

  <div class="container" style="max-width: 600px;">
    <h1 class="text-center mb-5 fw-bold text-secondary">API Playground</h1>

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-dark text-white fw-semibold">Quotable API</div>
      <div class="card-body">
        <div id="content" class="text-muted my-3">Loading...</div>
        <button class="btn btn-success w-100 fw-bold py-2 button1">Get Random Quote</button>
      </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-dark text-white fw-semibold">Advice API</div>
      <div class="card-body">
        <div id="content2" class="text-muted my-3">Loading...</div>
        <button class="btn btn-primary w-100 fw-bold py-2 button2">Get Advice</button>
      </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-dark text-white fw-semibold">Dog Image API</div>
      <div class="card-body">
        <div id="content3" class="text-muted my-3 text-center">Loading...</div>
        <button class="btn btn-warning w-100 fw-bold py-2 text-white button3">Get Dog Photo</button>
      </div>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-dark text-white fw-semibold">Cat Info API</div>
      <div class="card-body">
        <div id="content4" class="text-muted my-3">Loading...</div>
        <button class="btn btn-info w-100 fw-bold py-2 text-white button4">Get Cat Fact</button>
      </div>
    </div>

  </div>

  <script>
    // 1. Quotable
    const contentDiv = document.getElementById('content');
    document.querySelector('.button1').addEventListener('click', () => {
      fetch('https://api.quotable.io/random')
        .then(res => res.json())
        .then(data => {
          contentDiv.innerHTML = `<p class="mb-0"><strong>Quote:</strong> "${data.content}" <br><span class="text-secondary">- ${data.author}</span></p>`;
        })
    });

    // 2. Advice (Using Quotable placeholder for stability)
    const contentDiv2 = document.getElementById('content2');
    document.querySelector('.button2').addEventListener('click', () => {
      fetch('https://api.quotable.io/random')
        .then(res => res.json())
        .then(data => {
          contentDiv2.innerHTML = `<p class="mb-0"><strong>Quote:</strong> "${data.content}"</p>`;
        })
    });

    // 3. Dog API (Outputs proper image rendering)
    const contentDiv3 = document.getElementById('content3');
    document.querySelector('.button3').addEventListener('click', () => {
      fetch('https://dog.ceo/api/breeds/image/random')
        .then(res => res.json())
        .then(data => {
          contentDiv3.innerHTML = `<img src="${data.message}" class="img-fluid rounded shadow-sm mx-auto d-block" style="max-height: 300px;" alt="Dog">`;
        })
    });

    // 4. Cat Fact
    const contentDiv4 = document.getElementById('content4');
    document.querySelector('.button4').addEventListener('click', () => {
      fetch('https://catfact.ninja/fact')
        .then(res => res.json())
        .then(data => {
          contentDiv4.innerHTML = `<p class="mb-0"><strong>Fact:</strong> ${data.fact}</p>`;
        })
    });
  </script>
</body>
</html>
